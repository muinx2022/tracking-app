{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="surface-card mx-auto max-w-md rounded-2xl border p-8">
  <h1 class="text-main mb-6 text-xl font-semibold tracking-tight">Log in</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="message-error rounded-lg border px-3 py-2 text-sm">
        {{ form.non_field_errors }}
      </div>
    {% endif %}
    <div>
      <label class="text-muted-ui mb-1 block text-sm" for="id_username">Username</label>
      <input type="text" name="username" id="id_username" required autofocus
        class="input-themed w-full rounded-lg px-3 py-2">
    </div>
    <div>
      <label class="text-muted-ui mb-1 block text-sm" for="id_password">Password</label>
      <input type="password" name="password" id="id_password" required
        class="input-themed w-full rounded-lg px-3 py-2">
    </div>
    <button type="submit" class="btn-primary w-full rounded-lg py-2.5 font-medium">Sign in</button>
  </form>
</div>
{% endblock %}
