{% extends "base.html" %}
{% block title %}{{ form_title|default:"New project" }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-lg">
  <h1 class="mb-6 text-2xl font-semibold text-white">{{ form_title|default:"New project" }}</h1>
  <form method="post" class="space-y-4 rounded-xl border border-slate-800 bg-slate-900/40 p-6">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="mb-1 block text-sm text-slate-400" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field.errors }}
        {{ field }}
      </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500">{{ submit_label|default:"Create" }}</button>
      <a href="{% url 'user_dashboard' %}" class="rounded-md border border-slate-600 px-4 py-2 text-sm text-slate-300 hover:bg-slate-800">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
