{% extends "base.html" %}
{% block title %}{{ form_title|default:"New project" }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-lg">
  <h1 class="text-main mb-6 text-2xl font-semibold">{{ form_title|default:"New project" }}</h1>
  <form method="post" class="surface-panel space-y-4 rounded-xl border p-6">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="text-muted-ui mb-1 block text-sm" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field.errors }}
        {{ field }}
      </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn-primary rounded-md px-4 py-2 text-sm font-medium">{{ submit_label|default:"Create" }}</button>
      <a href="{% url 'user_dashboard' %}" class="btn-secondary rounded-md px-4 py-2 text-sm">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
